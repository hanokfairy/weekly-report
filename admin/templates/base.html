<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{% block title %}주간보고 관리자{% endblock %}</title>
  <style>
    body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; color: #222; }
    nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 12px; margin-bottom: 20px; }
    nav a { margin-right: 12px; text-decoration: none; color: #0b5fff; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
    th { background: #f5f5f5; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input[type=text], input[type=number], input[type=password], textarea {
      width: 100%; padding: 8px; font-size: 15px; box-sizing: border-box; margin-top: 4px;
    }
    button, .btn { background: #0b5fff; color: white; border: none; padding: 10px 16px; font-size: 15px; border-radius: 6px; cursor: pointer; margin-top: 14px; }
    button.secondary, .btn.secondary { background: #888; }
    .flash { background: #fff3cd; border: 1px solid #ffe08a; padding: 10px; border-radius: 6px; margin-bottom: 14px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    form.inline { display: inline; }
  </style>
</head>
<body>
  <nav>
    <div><a href="{{ url_for('dashboard') }}">대시보드</a></div>
    {% if session.get('user') %}
      <div>{{ session['user'] }}님 | <a href="{{ url_for('logout') }}">로그아웃</a></div>
    {% endif %}
  </nav>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
