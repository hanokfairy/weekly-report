name: Weekly Report

on:
  schedule:
    # 매주 월요일 09:00 (KST) = 매주 월요일 00:00 (UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: GA4 서비스 계정 키 파일 생성
        env:
          GA4_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: echo "$GA4_JSON" > config/ga4-service-account.json

      - name: 환경변수(.env) 파일 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          cat <<EOF > .env
          NAVER_CLIENT_ID=$NAVER_CLIENT_ID
          NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
          GA4_CREDENTIALS_PATH=./config/ga4-service-account.json
          SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN
          EOF

      - name: 주간 보고서 실행 (Slack 자동 전송 포함)
        run: python main.py

      - name: 생성된 보고서를 저장소에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add reports/*.md
          git diff --cached --quiet || git commit -m "chore: 주간보고 $(date +'%Y-%m-%d')"
          git push
